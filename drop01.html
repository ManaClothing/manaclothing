<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANA | DROP 01</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Efecto de elevación para las poleras */
        .item-polera {
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            color: inherit;
            text-align: center;
        }

        .item-polera:hover {
            transform: translateY(-20px);
            filter: brightness(1.1);
        }

        .item-polera:hover .foto-placeholder {
            box-shadow: 0px 30px 60px rgba(255, 255, 255, 0.15);
            border-color: #444;
        }

        /* Centrado del título y subtítulo */
        .drop-header {
            text-align: center;
            padding-top: 150px;
            margin-bottom: 80px;
        }

        .drop-header h1 {
            color: #fff;
            font-weight: 200;
            letter-spacing: 15px; /* Devuelve el ancho a las letras */
            margin: 0;
            font-size: 3rem;
            text-transform: uppercase;
        }

        .drop-header p {
            color: #555;
            letter-spacing: 5px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .galeria-poleras {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            padding-bottom: 100px;
        }
    </style>
</head>
<body class="drop-page" style="background: #000; margin: 0;">
    <header>
        <div class="logo">
            <img src="LOGO-MANA-BLANCO.png" alt="MANA Logo">
        </div>
        <nav class="menu">
            <a href="index.html">INICIO</a>
            <div class="dropdown">
                <a href="#" class="dropbtn">COLECCIONES</a>
                <div class="dropdown-content">
                    <a href="drop01.html">DROP 01: LA PRIMERA HUELLA</a>
                </div>
            </div>
            <a href="nosotros.html">SOBRE NOSOTROS</a>
        </nav>
    </header>
<main style="display: block; width: 100%; padding-top: 150px; background: #000;">
        
        <div style="width: 100%; text-align: center; margin-bottom: 60px; display: block; clear: both;">
            <h1 style="color: #fff; font-weight: 1500; letter-spacing: 15px; margin: 0 auto; font-size: 3rem; display: block; width: fit-content;">
                DROP 01
            </h1>
            <p style="color: #555; letter-spacing: 5px; margin: 15px auto 0; font-size: 0.9rem; display: block; width: fit-content;">
                LA PRIMERA HUELLA - PROTOTIPOS 2026
            </p>
        </div>

        <div class="galeria-poleras" style="display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; padding-bottom: 100px; width: 100%;">
            
            <a href="producto-negra.html" class="item-polera">
                <div class="foto-placeholder" style="width: 450px; height: 600px; background: #000; border: 1px solid #222; overflow: hidden; display: flex;">
                    <img src="polera-negra.png" alt="Polera Cóndor Tribal" style="width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;">
                </div>
                <h3 style="margin-top: 20px; letter-spacing: 3px; color: #fff;">POLERA OVERSIZE CÓNDOR TRIBAL</h3>
                <p style="letter-spacing: 3px; margin: 10px 0; color: #fff;">150 Bs.</p>
                <span style="color: #555; font-size: 12px; letter-spacing: 2px;">VER DETALLES</span>
            </a>

            <a href="producto-blanca.html" class="item-polera">
                <div class="foto-placeholder" style="width: 450px; height: 600px; background: #000; border: 1px solid #222; overflow: hidden; display: flex;">
                    <img src="polera-blanca.png" alt="Polera Blanca Qué Pues!" style="width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;">
                </div>
                <h3 style="margin-top: 20px; letter-spacing: 3px; color: #fff;">POLERA BOXYFIT BLANCA QUÉ PUES!</h3>
                <p style="letter-spacing: 3px; margin: 10px 0; color: #fff;">130 Bs.</p>
                <span style="color: #555; font-size: 12px; letter-spacing: 2px;">VER DETALLES</span>
            </a>
        </div>
    </main>
</body>
</html>
