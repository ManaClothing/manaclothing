<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANA | Cóndor Tribal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000;">
    <header>
        <div class="logo"><img src="LOGO-MANA-BLANCO.png" alt="MANA Logo"></div>
        <nav class="menu">
            <a href="index.html">INICIO</a>
            <a href="drop01.html">VOLVER</a>
        </nav>
    </header>

    <main style="padding-top: 150px; display: flex; justify-content: center; align-items: flex-start; gap: 60px; flex-wrap: wrap; padding-bottom: 50px; max-width: 1200px; margin: 0 auto;">
        
        <div class="carrusel" id="carrusel-negra" style="width: 450px; height: 600px; position: relative; background: #0a0a0a; border: 1px solid #222; overflow: hidden; flex-shrink: 0;">
    <div class="carrusel-fotos" style="width: 100%; height: 100%;">
        <img src="negra-1.png" class="foto-activa" style="width: 100%; height: 100%; object-fit: cover; object-position: top;">
        <img src="negra-2.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
        <img src="negra-3.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
        <img src="negra-4.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
        <img src="negra-5.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
    </div>
    <button class="prev" onclick="cambiarFoto(-1, 'carrusel-negra')" style="position: absolute; left: 0; top: 0; bottom: 0; width: 60px; background: rgba(0,0,0,0); color: #fff; border: none; cursor: pointer; z-index: 10; font-size: 30px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease-in-out;"> ‹ </button>
<button class="next" onclick="cambiarFoto(1, 'carrusel-negra')" style="position: absolute; right: 0; top: 0; bottom: 0; width: 60px; background: rgba(0,0,0,0); color: #fff; border: none; cursor: pointer; z-index: 10; font-size: 30px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease-in-out;"> › </button>

        <div style="text-align: left; width: 400px; flex-shrink: 0; padding-top: 20px;">
           <h1 style="font-family: 'ManaGotico', sans-serif; font-size: 3.8rem; font-weight: normal; letter-spacing: 3px; margin-bottom: 20px; color: #fff; text-transform: uppercase;">
    CÓNDOR TRIBAL
</h1>
            
            <p style="color: #888; margin-bottom: 30px; line-height: 2; font-size: 0.9rem; letter-spacing: 1px;">
                <strong>TALLA:</strong> L<br>
                <strong>CORTE:</strong> Oversize<br>
                <strong>COLOR:</strong> Negro<br>
                <strong>TELA:</strong> Algodón<br>
                <strong>ESTILO:</strong> Gótico Tribal
            </p>
            
            <p style="color: #fff; font-size: 24px; letter-spacing: 3px; margin-bottom: 40px; font-weight: 600;">150 Bs.</p>
            
            <a href="https://wa.me/59170350964" style="border: 1px solid #fff; padding: 15px 40px; color: #fff; text-decoration: none; letter-spacing: 2px; font-size: 11px; font-weight: 700; transition: 0.3s;">COMPRAR AHORA</a>
        </div>
    </main>

   <style>
        /* Muestra la foto que tiene la clase 'foto-activa' y oculta las demás */
        .carrusel-fotos img.foto-activa {
            display: block !important;
        }

        /* --- ESTILO PARA LAS FLECHAS --- */
        .prev, .next {
            transition: all 0.3s ease-in-out !important; /* Hace que todo el movimiento sea suave */
        }

        /* Animación cuando pasas el mouse sobre la flecha IZQUIERDA */
        .prev:hover {
            background: rgba(255, 255, 255, 0.05) !important; /* Brillo muy sutil */
            transform: translateX(-8px); /* Se mueve un poco a la izquierda */
        }

        /* Animación cuando pasas el mouse sobre la flecha DERECHA */
        .next:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            transform: translateX(8px); /* Se mueve un poco a la derecha */
        }

        /* Opcional: un efecto de pulso para que se note más el clic */
        .prev:active, .next:active {
            transform: scale(0.9);
        }
    </style>

    <script>
    function cambiarFoto(n, idCarrusel) {
        const carrusel = document.getElementById(idCarrusel);
        const fotos = carrusel.querySelectorAll('.carrusel-fotos img');
        const btnPrev = carrusel.querySelector('.prev');
        const btnNext = carrusel.querySelector('.next');
        let activa = 0;

        fotos.forEach((foto, index) => {
            if(foto.classList.contains('foto-activa')) {
                activa = index;
                foto.classList.remove('foto-activa');
            }
        });

        activa += n;
        fotos[activa].classList.add('foto-activa');

        // Ocultar flechas si es la primera o la última
        btnPrev.style.display = (activa === 0) ? "none" : "block";
        btnNext.style.display = (activa === fotos.length - 1) ? "none" : "block";
    }

    // Al cargar, ocultar la flecha de "atrás" porque empezamos en la foto 1
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelector('.prev').style.display = "none";
    });
    </script>
</body>
</html>
