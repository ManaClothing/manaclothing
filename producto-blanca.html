<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANA | Cóndor Tribal Blanca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000; color: #fff; margin: 0; font-family: sans-serif;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <header>
        <div class="logo">
            <img src="LOGO-MANA-BLANCO.png" alt="MANA Logo">
        </div>
        <nav class="menu">
            <a href="index.html">INICIO</a>
            <a href="drop01.html">VOLVER</a>
        </nav>
    </header>

    <main style="padding-top: 120px; display: flex; justify-content: center; align-items: flex-start; gap: 60px; flex-wrap: wrap; padding-bottom: 50px; max-width: 1200px; margin: 0 auto;">
        
        <div class="carrusel" id="carrusel-blanca" style="width: 450px; height: 600px; position: relative; background: #0a0a0a; border: 1px solid #222; overflow: hidden; flex-shrink: 0;">
            <div class="carrusel-fotos" style="width: 100%; height: 100%;">
                <img src="blanca-1.png" class="foto-activa" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: block;">
                <img src="blanca-2.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
                <img src="blanca-3.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
                <img src="blanca-4.png" style="width: 100%; height: 100%; object-fit: cover; object-position: top; display: none;">
            </div>
            
            <button class="prev" onclick="cambiarFoto(-1, 'carrusel-blanca')" style="position: absolute; left: 0; top: 0; bottom: 0; width: 60px; background: transparent; color: #fff; border: none; cursor: pointer; z-index: 10; font-size: 35px; display: flex; align-items: center; justify-content: center; outline: none;"> ‹ </button>
            <button class="next" onclick="cambiarFoto(1, 'carrusel-blanca')" style="position: absolute; right: 0; top: 0; bottom: 0; width: 60px; background: transparent; color: #fff; border: none; cursor: pointer; z-index: 10; font-size: 35px; display: flex; align-items: center; justify-content: center; outline: none;"> › </button>
        </div>

        <div style="text-align: left; width: 400px; flex-shrink: 0; padding-top: 20px;">
            <h1 style="font-family: 'ManaGraffiti', cursive; font-size: 4.5rem; font-weight: normal; letter-spacing: 1px; margin-bottom: 20px; color: #fff; text-transform: uppercase; line-height: 1;">
    QUÉ PUES
</h1>
            
            <p style="color: #888; margin-bottom: 30px; line-height: 2; font-size: 0.9rem; letter-spacing: 1px;">
                <strong>TALLA:</strong> L<br>
                <strong>CORTE:</strong> BoxyFit<br>
                <strong>COLOR:</strong> Blanco<br>
                <strong>TELA:</strong> Algodón<br>
                <strong>ESTILO:</strong> Graffiti
            </p>
            
            <p style="color: #fff; font-size: 24px; letter-spacing: 3px; margin-bottom: 40px; font-weight: 600;">130 Bs.</p>
            
            <a href="https://wa.me/59170350964?text=Hola!%20Quiero%20la%20polera%20Condor%20Tribal%20Blanca" target="_blank" style="border: 1px solid #fff; padding: 15px 40px; color: #fff; text-decoration: none; letter-spacing: 2px; font-size: 11px; font-weight: 700; transition: 0.3s; display: inline-block;">COMPRAR AHORA</a>
        </div>
    </main>

    <style>
        .carrusel-fotos img.foto-activa { display: block !important; }
        .prev, .next { transition: all 0.3s ease-in-out !important; }
        .prev:hover { background: none !important; transform: translateX(-8px); }
        .next:hover { background: none !important; transform: translateX(8px); }
        .prev:active, .next:active { transform: scale(0.8); }
    </style>

    <script>
    function cambiarFoto(n, idCarrusel) {
        const carrusel = document.getElementById(idCarrusel);
        const fotos = carrusel.querySelectorAll('.carrusel-fotos img');
        const btnPrev = carrusel.querySelector('.prev');
        const btnNext = carrusel.querySelector('.next');
        let activa = 0;

        fotos.forEach((foto, index) => {
            if(foto.style.display === 'block' || foto.classList.contains('foto-activa')) {
                activa = index;
                foto.style.display = 'none';
                foto.classList.remove('foto-activa');
            }
        });

        let nuevaPosicion = activa + n;
        
        if (nuevaPosicion >= 0 && nuevaPosicion < fotos.length) {
            fotos[nuevaPosicion].style.display = 'block';
            fotos[nuevaPosicion].classList.add('foto-activa');
            activa = nuevaPosicion;
        }

        btnPrev.style.visibility = (activa === 0) ? "hidden" : "visible";
        btnNext.style.visibility = (activa === fotos.length - 1) ? "hidden" : "visible";
    }

    document.addEventListener("DOMContentLoaded", () => {
        const carrusel = document.getElementById('carrusel-blanca');
        carrusel.querySelector('.prev').style.visibility = "hidden";
    });
    </script>
</body>
</html>
